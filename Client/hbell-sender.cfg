# HBELL Sender Configuration
# Version 1.3.0

[STORE]
# [GROUP][SERVER NO][STORE NO]
# Store NO range : 0 ~ 9
# ex) group0, server1 -> 001
# ex) group1, server1 -> 111
ADDRESS = 000

# Server Count.
# To get correct ACKs.
MAX_SVR_NO = 1

[NRF24]
# SENDER PIPE INDEX RANGE: 0 ~ 8
# CAN BE ADDED MULTIPLE INDICES
# EX) PIPE_IDX = 0,3,7
PIPE_IDX = 0

# CHANNEL SHOULD BE MATCHED WITH RECEIVER
CHANNEL = 96

RETRY_CNT = 10
RETRY_INTERVAL = 20
SPI_SPEED = 2000000

# RF24/WIFI Alive Signal
ALIVE_INTERVAL = 5

# WiFi Multicast settings
[WIFI-M]
MCAST_GRP = 239.192.10.142
MCAST_PORT = 50000
MCAST_BUF_SIZE = 1024
MCAST_TIMEOUT = 1
MCAST_RETRY_CNT = 3

[KEYPAD]
# Set to False to disable sound True / False
ENABLE_SOUND = False

# Prefere RF24 / WIFI
SIG_PREFER = RF24
